<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার মিষ্টি আপুর জন্য একটা সারপ্রাইজ! 🎁🌸</title>
    <style>
        :root {
            --bg: #FFF5F7;
            --rose: #FF8DA1;
            --text: #5C4B4E;
            --paper: #FFFFFF;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg);
            font-family: 'Arial', sans-serif;
            display: block;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .envelope {
            font-size: 80px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.3s;
            user-select: none;
            filter: drop-shadow(0 5px 10px rgba(255,141,161,0.2));
            margin-bottom: 20px;
        }
        .envelope:active {
            transform: scale(0.9);
        }
        .btn {
            background-color: var(--rose);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255,141,161,0.4);
            font-weight: bold;
            display: inline-block;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .wish-box {
            display: none;
            background: var(--paper);
            padding: 30px;
            border-radius: 20px;
            border: 3px dashed var(--rose);
            box-shadow: 0 10px 30px rgba(255,141,161,0.15);
        }
        h1 { color: var(--rose); font-size: 22px; margin-bottom: 15px; }
        p { color: var(--text); font-size: 16px; line-height: 1.6; font-weight: bold; min-height: 80px; }
        
        /* মিষ্টি লাভ ও ফুল অ্যানিমেশন */
        .heart {
            position: absolute;
            font-size: 22px;
            animation: float 3.5s linear infinite;
            bottom: -20px;
            opacity: 0;
            user-select: none;
            pointer-events: none;
        }
        @keyframes float {
            0% { bottom: -20px; opacity: 1; transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(40px) rotate(180deg); }
            100% { bottom: 100vh; opacity: 0; transform: translateX(-40px) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- প্রথম ধাপ: বন্ধ খাম -->
        <div id="start-screen">
            <div class="envelope" id="env-click">✉️🌸</div>
            <br>
            <button class="btn" id="btn-click">চিঠিটা খোলো আপু! ✨</button>
        </div>

        <!-- দ্বিতীয় ধাপ: আস্তে আস্তে উইশ খুলে যাওয়া -->
        <div class="wish-box" id="wish-screen">
            <h1>শুভ জন্মদিন আপু! 🎂🎉💖</h1>
            <p id="wish-text">তোমার জন্য একটা ছোট্ট সারপ্রাইজ...</p>
            <button class="btn" id="next-btn">পরের চিঠি ➡️</button>
        </div>
    </div>

    <script>
        // আপুর জন্য কিউট উইশ মেসেজগুলো
        const messages = [
            "আমার জীবনের অন্যতম সেরা এবং সবচেয়ে মিষ্টি আপুকে জানাই জন্মদিনের অনেক অনেক শুভেচ্ছা! 🌸✨",
            "তুমি শুধু আমার আপুই নও, আমার সবচেয়ে ভালো বন্ধুও। আমার সব আবদার সহ্য করার জন্য থ্যাঙ্ক ইউ সো মাচ! 🥹❤️",
            "আল্লাহ তোমার জীবনটা সবসময় সুখ, শান্তি আর হাসিতে ভরিয়ে রাখুক। তুমি সবসময় সুস্থ আর হাসিখুশি থাকো, এটাই আমার প্রার্থনা। 🤲🎈",
            "আজকের এই বিশেষ দিনে মিষ্টি করে একটা হাসো তো! সারা বছর যেন তোমার এই মিষ্টি হাসিটা মুখেই লেগে থাকে। 🥰🍰"
        ];
        
        let currentIdx = 0;

        // Functions
        function openWish() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('wish-screen').style.display = 'block';
            showNextMessage();
            setInterval(createHeart, 250); // লাভ ও ফুল ওড়ার অ্যানিমেশন শুরু
        }

        function showNextMessage() {
            if(currentIdx < messages.length) {
                document.getElementById('wish-text').innerText = messages[currentIdx];
                currentIdx++;
            } else {
                document.getElementById('wish-text').innerHTML = "<b>সবশেষে আবারও... হ্যাপি বার্থডে আমার কিউট আপু! 🥳🎈🌸<br>অনেক ভালোবাসি তোমাকে! ❤️</b>";
                document.getElementById('next-btn').style.display = 'none';
            }
        }

        // Add Event Listeners with JavaScript for maximum browser safety
        document.getElementById('env-click').addEventListener('click', openWish);
        document.getElementById('btn-click').addEventListener('click', openWish);
        document.getElementById('next-btn').addEventListener('click', showNextMessage);

        // স্ক্রিনে লাভ রিয়্যাক্ট ও ফুলের ম্যাজিক
        const icons = ['❤️', '🌸', '💖', '✨', '🎈'];
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = icons[Math.floor(Math.random() * icons.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
    </script>
</body>
</html>
